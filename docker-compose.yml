version: '3.8'

services:
  # Frontend - Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: calculator-frontend
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - calculator-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Backend - Node.js/Express
  backend-nodejs:
    build:
      context: .
      dockerfile: Dockerfile.nodejs
    container_name: calculator-nodejs
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - calculator-network
    volumes:
      - ./backend-nodejs:/app/backend-nodejs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Backend - Python/Flask
  backend-python:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: calculator-python
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    restart: unless-stopped
    networks:
      - calculator-network
    volumes:
      - ./backend-python:/app/backend-python
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  calculator-network:
    driver: bridge

volumes:
  frontend-cache:
  nodejs-cache:
  python-cache: